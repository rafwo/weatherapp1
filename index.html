<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background 1s ease;
    }

    body.sunny   { background: linear-gradient(135deg, #f7971e, #ffd200, #f7971e); }
    body.cloudy  { background: linear-gradient(135deg, #485563, #29323c, #485563); }
    body.rainy   { background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); }
    body.snowy   { background: linear-gradient(135deg, #e0eafc, #cfdef3, #e0eafc); color: #333; }
    body.thunder { background: linear-gradient(135deg, #0f0c29, #1a1a2e, #0f0c29); }

    /* Layout wrapper */
    .layout {
      display: flex;
      gap: 20px;
      width: 100%;
      max-width: 900px;
      align-items: flex-start;
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 28px;
      padding: 40px 36px;
      color: #fff;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    }

    /* Current weather card */
    .card-current {
      flex: 0 0 420px;
    }

    /* Forecast card */
    .card-forecast {
      flex: 1;
      min-width: 0;
      padding: 32px 28px;
    }

    body.snowy .card { color: #222; border-color: rgba(0,0,0,0.1); background: rgba(255,255,255,0.6); }

    /* Search */
    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 36px;
    }

    .search-bar input {
      flex: 1;
      padding: 14px 20px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border 0.2s;
    }
    .search-bar input::placeholder { color: rgba(255,255,255,0.5); }
    .search-bar input:focus { border-color: rgba(255,255,255,0.6); }
    body.snowy .search-bar input { color: #222; background: rgba(0,0,0,0.07); border-color: rgba(0,0,0,0.2); }
    body.snowy .search-bar input::placeholder { color: rgba(0,0,0,0.4); }

    .search-bar button {
      padding: 14px 20px;
      border-radius: 50px;
      border: none;
      background: rgba(255,255,255,0.2);
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .search-bar button:hover { background: rgba(255,255,255,0.35); }
    .search-bar button:active { transform: scale(0.95); }
    body.snowy .search-bar button { color: #222; background: rgba(0,0,0,0.1); }

    /* Location */
    .location {
      text-align: center;
      margin-bottom: 8px;
    }
    .location h2 {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .location p {
      font-size: 14px;
      opacity: 0.6;
      margin-top: 4px;
    }

    /* Weather icon */
    .weather-icon {
      text-align: center;
      font-size: 90px;
      margin: 20px 0 10px;
      line-height: 1;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
    }

    /* Temp */
    .temperature {
      text-align: center;
      margin-bottom: 6px;
    }
    .temperature .temp-main {
      font-size: 72px;
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1;
    }
    .temperature .temp-unit {
      font-size: 32px;
      font-weight: 300;
      vertical-align: super;
      margin-left: 2px;
    }
    .temperature .feels-like {
      font-size: 14px;
      opacity: 0.65;
      margin-top: 6px;
    }

    /* Description */
    .description {
      text-align: center;
      font-size: 18px;
      font-weight: 500;
      text-transform: capitalize;
      opacity: 0.85;
      margin-bottom: 32px;
    }

    /* Stats grid */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    .stat {
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 16px 12px;
      text-align: center;
    }
    body.snowy .stat { background: rgba(0,0,0,0.07); }
    .stat i {
      font-size: 20px;
      opacity: 0.75;
      margin-bottom: 8px;
      display: block;
    }
    .stat .stat-value {
      font-size: 18px;
      font-weight: 600;
    }
    .stat .stat-label {
      font-size: 11px;
      opacity: 0.55;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 3px;
    }

    /* Forecast */
    .forecast-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.55;
      margin-bottom: 20px;
    }

    .forecast-days {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .forecast-day {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 14px 18px;
      gap: 12px;
    }
    body.snowy .forecast-day { background: rgba(0,0,0,0.06); }

    .forecast-day .f-icon { font-size: 28px; flex: 0 0 36px; text-align: center; }

    .forecast-day .f-info { flex: 1; min-width: 0; }
    .forecast-day .f-day-name {
      font-size: 15px;
      font-weight: 600;
    }
    .forecast-day .f-desc {
      font-size: 12px;
      opacity: 0.6;
      text-transform: capitalize;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .forecast-day .f-temps {
      text-align: right;
      flex: 0 0 auto;
    }
    .forecast-day .f-temp-high {
      font-size: 18px;
      font-weight: 700;
    }
    .forecast-day .f-temp-low {
      font-size: 13px;
      opacity: 0.5;
      margin-top: 2px;
    }

    /* Error / loading */
    .message {
      text-align: center;
      padding: 20px;
      opacity: 0.7;
      font-size: 15px;
    }
    .error { color: #ff8a8a; opacity: 1; }

    .hidden { display: none; }

    /* API key setup */
    .setup {
      text-align: center;
      padding: 10px 0 20px;
    }
    .setup p { opacity: 0.7; font-size: 14px; line-height: 1.6; margin-bottom: 16px; }
    .setup a { color: #82cfff; }

    .api-input-row {
      display: flex;
      gap: 10px;
    }
    .api-input-row input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    .api-input-row input::placeholder { color: rgba(255,255,255,0.4); }
    .api-input-row button {
      padding: 12px 20px;
      border-radius: 50px;
      border: none;
      background: #4f8ef7;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .api-input-row button:hover { background: #3a7be0; }

    /* Responsive: stack on small screens */
    @media (max-width: 700px) {
      .layout { flex-direction: column; }
      .card-current { flex: none; width: 100%; }
      .card-forecast { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="layout">

    <!-- Current weather card -->
    <div class="card card-current">

      <!-- API Key Setup -->
      <div id="setup-section" class="setup hidden">
        <p>
          To get started, enter your free API key from<br>
          <a href="https://openweathermap.org/api" target="_blank">openweathermap.org</a>
          (free tier works great).
        </p>
        <div class="api-input-row">
          <input type="text" id="api-key-input" placeholder="Paste your API key here" />
          <button onclick="saveApiKey()">Save</button>
        </div>
      </div>

      <!-- Main weather UI -->
      <div id="main-section" class="hidden">
        <div class="search-bar">
          <input type="text" id="city-input" placeholder="Search city..." onkeydown="if(event.key==='Enter') fetchWeather()" />
          <button onclick="fetchWeather()"><i class="fa fa-search"></i></button>
          <button onclick="getLocation()" title="Use my location"><i class="fa fa-location-dot"></i></button>
        </div>

        <div id="loading" class="message hidden"><i class="fa fa-spinner fa-spin"></i> Loading...</div>
        <div id="error-msg" class="message error hidden"></div>

        <div id="weather-data" class="hidden">
          <div class="location">
            <h2 id="city-name"></h2>
            <p id="date-time"></p>
          </div>
          <div class="weather-icon" id="weather-icon"></div>
          <div class="temperature">
            <div><span class="temp-main" id="temp"></span><span class="temp-unit">°C</span></div>
            <div class="feels-like" id="feels-like"></div>
          </div>
          <div class="description" id="description"></div>
          <div class="stats">
            <div class="stat">
              <i class="fa fa-droplet"></i>
              <div class="stat-value" id="humidity"></div>
              <div class="stat-label">Humidity</div>
            </div>
            <div class="stat">
              <i class="fa fa-wind"></i>
              <div class="stat-value" id="wind"></div>
              <div class="stat-label">Wind</div>
            </div>
            <div class="stat">
              <i class="fa fa-eye"></i>
              <div class="stat-value" id="visibility"></div>
              <div class="stat-label">Visibility</div>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- 3-day forecast card -->
    <div class="card card-forecast hidden" id="forecast-card">
      <div class="forecast-title">3-Day Forecast</div>
      <div class="forecast-days" id="forecast-days"></div>
    </div>

  </div>

  <script>
    const API_BASE     = 'https://api.openweathermap.org/data/2.5/weather';
    const FORECAST_BASE = 'https://api.openweathermap.org/data/2.5/forecast';

    function getApiKey() {
      return localStorage.getItem('owm_api_key');
    }

    function saveApiKey() {
      const key = document.getElementById('api-key-input').value.trim();
      if (!key) return;
      localStorage.setItem('owm_api_key', key);
      init();
    }

    function init() {
      const key = getApiKey();
      if (!key) {
        document.getElementById('setup-section').classList.remove('hidden');
        document.getElementById('main-section').classList.add('hidden');
      } else {
        document.getElementById('setup-section').classList.add('hidden');
        document.getElementById('main-section').classList.remove('hidden');
        getLocation();
      }
    }

    function getLocation() {
      if (!navigator.geolocation) { fetchWeather('Warsaw'); return; }
      showLoading(true);
      navigator.geolocation.getCurrentPosition(
        pos => fetchByCoords(pos.coords.latitude, pos.coords.longitude),
        () => fetchWeather('Warsaw')
      );
    }

    async function fetchByCoords(lat, lon) {
      const key = getApiKey();
      showLoading(true);
      showError('');
      try {
        const [weatherRes, forecastRes] = await Promise.all([
          fetch(`${API_BASE}?lat=${lat}&lon=${lon}&appid=${key}&units=metric`),
          fetch(`${FORECAST_BASE}?lat=${lat}&lon=${lon}&appid=${key}&units=metric`)
        ]);
        const weather  = await weatherRes.json();
        const forecast = await forecastRes.json();
        if (weather.cod !== 200) throw new Error(weather.message);
        renderWeather(weather);
        renderForecast(forecast);
      } catch (e) {
        showError(e.message);
      }
    }

    async function fetchWeather(cityOverride) {
      const city = cityOverride || document.getElementById('city-input').value.trim();
      if (!city) return;
      const key = getApiKey();
      showLoading(true);
      showError('');
      try {
        const [weatherRes, forecastRes] = await Promise.all([
          fetch(`${API_BASE}?q=${encodeURIComponent(city)}&appid=${key}&units=metric`),
          fetch(`${FORECAST_BASE}?q=${encodeURIComponent(city)}&appid=${key}&units=metric`)
        ]);
        const weather  = await weatherRes.json();
        const forecast = await forecastRes.json();
        if (weather.cod !== 200) throw new Error(weather.message);
        renderWeather(weather);
        renderForecast(forecast);
      } catch (e) {
        showError(e.message === 'city not found' ? 'City not found. Try another name.' : e.message);
      }
    }

    function renderWeather(d) {
      showLoading(false);
      document.getElementById('weather-data').classList.remove('hidden');

      document.getElementById('city-name').textContent = `${d.name}, ${d.sys.country}`;
      document.getElementById('date-time').textContent = formatDate(new Date());
      document.getElementById('temp').textContent = Math.round(d.main.temp);
      document.getElementById('feels-like').textContent = `Feels like ${Math.round(d.main.feels_like)}°C`;
      document.getElementById('description').textContent = d.weather[0].description;
      document.getElementById('humidity').textContent = `${d.main.humidity}%`;
      document.getElementById('wind').textContent = `${Math.round(d.wind.speed)} m/s`;
      document.getElementById('visibility').textContent = d.visibility >= 1000
        ? `${(d.visibility / 1000).toFixed(1)} km` : `${d.visibility} m`;

      document.getElementById('weather-icon').textContent = weatherIcon(d.weather[0].id, d.weather[0].icon);
      applyTheme(d.weather[0].id, d.weather[0].icon);
    }

    function renderForecast(data) {
      // Group 3-hour slots by day, skip today
      const today = new Date().toDateString();
      const byDay = {};

      for (const item of data.list) {
        const date = new Date(item.dt * 1000);
        const key  = date.toDateString();
        if (key === today) continue;
        if (!byDay[key]) byDay[key] = [];
        byDay[key].push(item);
      }

      const days = Object.entries(byDay).slice(0, 3);
      const container = document.getElementById('forecast-days');
      container.innerHTML = '';

      for (const [dayStr, slots] of days) {
        const temps = slots.map(s => s.main.temp);
        const high  = Math.round(Math.max(...temps));
        const low   = Math.round(Math.min(...temps));

        // Pick midday slot or first available
        const midday = slots.find(s => {
          const h = new Date(s.dt * 1000).getHours();
          return h >= 11 && h <= 14;
        }) || slots[0];

        const dayName = new Date(dayStr).toLocaleDateString('en-US', { weekday: 'long' });
        const icon    = weatherIcon(midday.weather[0].id, midday.weather[0].icon);
        const desc    = midday.weather[0].description;

        container.innerHTML += `
          <div class="forecast-day">
            <div class="f-icon">${icon}</div>
            <div class="f-info">
              <div class="f-day-name">${dayName}</div>
              <div class="f-desc">${desc}</div>
            </div>
            <div class="f-temps">
              <div class="f-temp-high">${high}°C</div>
              <div class="f-temp-low">${low}°C</div>
            </div>
          </div>`;
      }

      document.getElementById('forecast-card').classList.remove('hidden');
    }

    function weatherIcon(id, icon) {
      const isNight = icon.endsWith('n');
      if (id >= 200 && id < 300) return '⛈️';
      if (id >= 300 && id < 400) return '🌦️';
      if (id >= 500 && id < 600) return id >= 511 ? '🌨️' : '🌧️';
      if (id >= 600 && id < 700) return '❄️';
      if (id >= 700 && id < 800) return '🌫️';
      if (id === 800) return isNight ? '🌙' : '☀️';
      if (id === 801) return '🌤️';
      if (id <= 804) return '☁️';
      return '🌡️';
    }

    function applyTheme(id, icon) {
      const body = document.body;
      body.className = '';
      if (id >= 200 && id < 300) body.classList.add('thunder');
      else if (id >= 300 && id < 700) body.classList.add('rainy');
      else if (id >= 600 && id < 700) body.classList.add('snowy');
      else if (id === 800) body.classList.add('sunny');
      else body.classList.add('cloudy');
    }

    function formatDate(d) {
      return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function showLoading(show) {
      document.getElementById('loading').classList.toggle('hidden', !show);
      if (show) document.getElementById('weather-data').classList.add('hidden');
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.toggle('hidden', !msg);
      if (msg) {
        showLoading(false);
        document.getElementById('weather-data').classList.add('hidden');
        document.getElementById('forecast-card').classList.add('hidden');
      }
    }

    init();
  </script>
</body>
</html>
